<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery - A2Z Smart Solutions Limited</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      line-height: 1.6;
      background-color: #f9f9f9;
    }
    header {
      background: #004d40;
      color: #fff;
      padding: 15px 20px;
      text-align: center;
    }
    nav ul {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      justify-content: center;
      background: #00695c;
    }
    nav ul li {
      margin: 0 15px;
    }
    nav ul li a {
      color: #fff;
      text-decoration: none;
      font-weight: bold;
    }
    .container {
      max-width: 1000px;
      margin: 20px auto;
      padding: 20px;
    }
    h2 {
      color: #004d40;
      text-align: center;
      margin-bottom: 20px;
    }
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 15px;
    }
    .gallery img {
      width: 100%;
      height: auto;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      transition: transform 0.3s ease;
    }
    .gallery img:hover {
      transform: scale(1.05);
    }
    footer {
      background: #004d40;
      color: #fff;
      text-align: center;
      padding: 20px;
      margin-top: 30px;
    }
    footer a {
      color: #ff9800;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <header>
    <h1>A2Z Smart Solutions Limited</h1>
    <p>Reliable, Efficient, Professional Services</p>
  </header>

  <nav>
    <ul>
      <li><a href="index.html">Home</a></li>

      <li><a href="gallery.html">Gallery</a></li>
      <li><a href="testimonials.html">Testimonials</a></li>
      <li><a href="contact.html">Contact Us</a></li>
    </ul>
  </nav>

  <div class="container">
    <h2>Our Work Gallery</h2>
    <div class="gallery">
      <img src="gallery1.jpg" alt="Catering Event">
      <img src="gallery2.jpg" alt="Event Decoration">
      <img src="gallery3.jpg" alt="Handyman Service">
      <img src="gallery4.jpg" alt="General Maintenance">
      <img src="gallery5.jpg" alt="Custom Request Project">
    </div>
  </div>

  <footer>
    <p>Phone: [Add Number] | Email: [Add Email] | Location: [Add Address]</p>
    <p>Connect with us on 
      <a href="#">Facebook</a>, 
      <a href="#">Instagram</a>, 
      <a href="#">WhatsApp</a>
    </p>
  </footer>
</body>
</html>
